<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ローンチスケジュール</title>
  <link rel="stylesheet" href="./styles.css?v=20260719-3" />
</head>
<body>
  <main class="container">
    <header class="page-header">
      <h1>ローンチスケジュール</h1>
    </header>

    <section class="layout single">
      <div class="left-pane">
        <section class="card">
          <div class="list-header">
            <h2>イベント一覧</h2>
            <button type="button" id="openAddButton">＋ イベント追加</button>
          </div>
          <div id="eventList"></div>
        </section>
        <section class="card">
          <div id="calendarControls"></div>
          <div id="calendarRoot"></div>
        </section>
      </div>
    </section>
  </main>

  <datalist id="nameOptions"></datalist>

  <div id="addModal" class="modal-overlay hidden">
    <div class="modal-box">
      <h3>イベント追加</h3>
      <form id="eventForm">
        <label>ローンチ名
          <input id="name" list="nameOptions" autocomplete="off" required />
        </label>
        <label>開始日 <span class="field-note">※最初の配信開始日</span>
          <input id="start" type="date" required />
        </label>
        <label>終了日 <span class="field-note">※後追いまでの完全終了日</span>
          <input id="end" type="date" required />
        </label>
        <label>面談開始日
          <input id="interview" type="date" required />
        </label>
        <label>セミナー実施日時 <span class="field-note">※任意・複数可（第1回・第2回…）</span></label>
        <div id="seminarListContainer"></div>
        <button type="button" id="addSeminarRow" class="secondary btn-small">＋ 日時を追加</button>
        <label>対象リスト <span class="field-note">※複数の場合は、リストを追加してください。</span></label>
        <div id="targetListContainer"></div>
        <button type="button" id="addTargetRow" class="secondary btn-small">＋ リスト追加</button>
        <label>帯の背景色
          <input id="fill" type="color" value="#dff4dc" />
        </label>
        <div class="buttons">
          <button type="submit" id="submitButton">追加する</button>
          <button type="button" id="addCancel" class="secondary">閉じる</button>
          <button type="button" id="addReset" class="secondary">リセット</button>
        </div>
      </form>
    </div>
  </div>

  <div id="seminarModal" class="modal-overlay hidden">
    <div class="modal-box">
      <h3>セミナー実施日時</h3>
      <div id="seminarEditName" class="seminar-edit-name"></div>
      <div id="seminarEditContainer"></div>
      <button type="button" id="seminarEditAddRow" class="secondary btn-small">＋ 日時を追加</button>
      <div class="buttons">
        <button type="button" id="seminarEditSave">保存する</button>
        <button type="button" id="seminarEditCancel" class="secondary">閉じる</button>
      </div>
    </div>
  </div>

  <script type="module" src="./app.js?v=20260719-3"></script>
</body>
</html>
